name: MeetingNotes
options:
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    ARCHS: arm64
    EXCLUDED_ARCHS: x86_64
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: "6.0"
packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: 1.0.0
targets:
  MeetingNotes:
    type: application
    platform: macOS
    sources:
      - MeetingNotes
    info:
      path: Configuration/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shenminghao.MeetingNotes
        PRODUCT_NAME: MeetingNotes
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          ENABLE_DEBUG_DYLIB: false
          ENABLE_TESTABILITY: true
          OTHER_CODE_SIGN_FLAGS: "--requirements=$(SRCROOT)/Configuration/MeetingNotesRequirements.req"
    entitlements:
      path: Configuration/MeetingNotes.entitlements
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
  MeetingNotesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MeetingNotesTests
    dependencies:
      - target: MeetingNotes
  MeetingNotesUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - MeetingNotesUITests
    dependencies:
      - target: MeetingNotes
    settings:
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Configuration/MeetingNotesUITests.entitlements
schemes:
  MeetingNotes:
    build:
      targets:
        MeetingNotes: all
    test:
      targets:
        - MeetingNotesTests
        - MeetingNotesUITests
